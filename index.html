<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Kiro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0d0d1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
    }
    #gameCanvas {
      display: block;
      image-rendering: pixelated;
    }
    #canvas-fallback {
      display: none;
      color: #e8e8f0;
      font-size: 1.2rem;
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <p id="canvas-fallback">Your browser does not support HTML5 Canvas. Please upgrade to a modern browser.</p>
  <script src="game.js" type="module"></script>
</body>
</html>
